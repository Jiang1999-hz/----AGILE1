<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juku AI Cloud Demo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <p class="eyebrow">Demo Login</p>
      <h1>Juku AI Cloud</h1>
      <p class="login-copy">面向小私塾的多角色演示版。请选择身份进入系统，三种角色都会先看到共同的塾内 News。</p>
      <div class="login-options">
        <button class="login-btn" data-role="student">以学生身份进入</button>
        <button class="login-btn" data-role="teacher">以老师身份进入</button>
        <button class="login-btn" data-role="admin">以管理员身份进入</button>
      </div>
      <div class="login-note">
        <strong>演示建议：</strong>
        <p>先用学生身份演示做题与沟通，再切换老师身份演示学生管理，最后切 admin 展示经营视角。</p>
      </div>
    </div>
  </div>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="brand-mark">J</div>
          <div>
            <p class="eyebrow">Juku x AI Cloud</p>
            <h2>私塾智能中枢</h2>
          </div>
        </div>

        <div class="identity-card">
          <p class="eyebrow">Current account</p>
          <strong id="account-name">-</strong>
          <span id="account-role">-</span>
        </div>

        <nav class="nav" id="sidebar-nav"></nav>
      </div>

      <div class="sidebar-footer">
        <p class="eyebrow">Demo Value</p>
        <ul>
          <li>学生做题即沉淀成进度数据</li>
          <li>老师能快速看到作业与风险</li>
          <li>管理员能看运营与预警</li>
        </ul>
        <button class="ghost-btn full-width" id="logout-btn" type="button">退出到登录页</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Workspace</p>
          <h1 id="page-title">-</h1>
        </div>
        <div class="topbar-actions">
          <span class="role-badge" id="role-badge">-</span>
          <button class="ghost-btn" id="quick-switch-student" type="button">学生</button>
          <button class="ghost-btn" id="quick-switch-teacher" type="button">老师</button>
          <button class="ghost-btn" id="quick-switch-admin" type="button">Admin</button>
        </div>
      </header>

      <section id="app-content"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
